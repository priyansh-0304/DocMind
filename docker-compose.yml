version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docmind_db
    restart: always
    environment:
      POSTGRES_DB: docmind
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d docmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: docmind_api
    restart: always
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: docmind_frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata: